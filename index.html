<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мадейра · Авторский тур · 17–24 октября</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@100;200;300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  /* Кинематографичная темная палитра */
  --bg:      #080A09; /* Почти черный с легким зеленым подтоном */
  --bg2:     #111412; /* Чуть светлее для выделения блоков */
  --bg-dark: #000000;
  --text:    #E8EBE9; /* Мягкий белый для текста */
  --muted:   #9BA6A0; /* Приглушенный серый для описаний */
  --acc:     #D4A373; /* Благородный песочно-золотой акцент */
  --sea:     #7C9A8B; /* Приглушенный цвет океана */
  --border:  rgba(255, 255, 255, 0.08);
  --border2: rgba(255, 255, 255, 0.15);
  --white:   #FFFFFF;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Montserrat', sans-serif;
  background-color: var(--bg);
  color: var(--text);
  font-weight: 300;
  line-height: 1.7;
  overflow-x: hidden;
  /* Добавляем легкий шум на фон для дорогой текстуры */
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
}

h1, h2, h3, h4 { font-family: 'Cormorant Garamond', serif; font-weight: 300; color: var(--white); }
img { display: block; width: 100%; }
a { text-decoration: none; color: inherit; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--sea); }

.wrap { max-width: 900px; margin: 0 auto; padding: 0 40px; }
.wrap-wide { max-width: 1140px; margin: 0 auto; padding: 0 40px; }
section { padding: 120px 0; }

/* 1. HERO (ВАУ Заголовок) */
.hero {
  height: 100vh;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  background: var(--bg-dark);
}
.hero-video {
  position: absolute;
  top: 50%; left: 50%;
  min-width: 100%; min-height: 100%;
  transform: translate(-50%, -50%);
  z-index: 0;
  opacity: 0.45;
  object-fit: cover;
  filter: contrast(1.1) brightness(0.8) grayscale(20%);
}
.hero-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(8,10,9,0.1) 40%, var(--bg) 100%);
  z-index: 1;
}
.hero-body {
  position: relative;
  z-index: 2;
  width: 100%;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.hero-tag {
  font-family: 'Montserrat', sans-serif;
  font-size: clamp(10px, 1.5vw, 14px);
  font-weight: 400;
  color: var(--acc);
  letter-spacing: 0.4em;
  text-transform: uppercase;
  margin-bottom: 2vh;
  opacity: 0; animation: fadeUp .9s .3s both;
}
.hero-title {
  font-family: 'Montserrat', sans-serif;
  font-weight: 200; /* Делаем тонким, как просил */
  font-size: 15vw; /* Размер на 100% ширины экрана */
  line-height: 0.8;
  color: var(--white);
  text-transform: uppercase;
  letter-spacing: 0.02em;
  white-space: nowrap; /* Запрещаем перенос */
  width: 100vw;
  text-align: center;
  opacity: 0; animation: fadeUp 1.2s .5s both;
}
.hero-sub {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(18px, 3vw, 28px);
  font-style: italic;
  color: rgba(255,255,255,0.7);
  margin-top: 3vh;
  opacity: 0; animation: fadeUp .9s .9s both;
}

/* 2. STATS BAR */
.stats {
  background: var(--bg);
  position: relative;
  z-index: 10;
  border-bottom: 1px solid var(--border);
  padding: 40px 0;
}
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  max-width: 1000px;
  margin: 0 auto;
}
.stat-box {
  text-align: center;
  border-right: 1px solid var(--border);
}
.stat-box:last-child { border-right: none; }
.stat-val { font-family: 'Cormorant Garamond', serif; font-size: 46px; font-weight: 300; color: var(--acc); display: block; line-height: 1; }
.stat-lbl { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.2em; color: var(--muted); margin-top: 10px; display: block; }

/* ТИПОГРАФИКА И БЛОКИ */
.stag { font-size: 10px; font-weight: 600; letter-spacing: .34em; text-transform: uppercase; color: var(--sea); margin-bottom: 18px; display: block; }
.sec-h { font-family: 'Cormorant Garamond', serif; font-size: clamp(40px, 7vw, 76px); font-weight: 300; line-height: 1.05; margin-bottom: 30px; }
.sec-h em { font-style: italic; color: var(--acc); }
.sec-txt { font-size: 16px; color: var(--muted); line-height: 1.8; max-width: 640px; margin-bottom: 20px; }

/* О ТУРЕ */
.intro-sec { background: var(--bg); position: relative; }
.hbox { margin-top: 60px; display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); }
.hbox-cell { padding: 36px 40px; background: var(--bg2); transition: background 0.3s; }
.hbox-cell:hover { background: #181c1a; }
.hbox-label { font-size: 10px; font-weight: 600; letter-spacing: .22em; text-transform: uppercase; color: var(--sea); margin-bottom: 12px; }
.hbox-stars { color: var(--acc); font-size: 18px; letter-spacing: 4px; }
.hbox-desc { font-size: 13px; color: var(--muted); margin-top: 10px; line-height: 1.7; }

/* БЛОК-РАЗДЕЛИТЕЛЬ (Параллакс между О Туре и Локациями) */
.divider-sec {
  height: 60vh;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  background: url('https://images.unsplash.com/photo-1518331302821-2e697c0f1606?w=2000&q=80') center/cover fixed no-repeat;
  text-align: center;
}
.divider-sec::after { content: ''; position: absolute; inset: 0; background: rgba(8,10,9,0.7); }
.divider-content { position: relative; z-index: 2; padding: 0 20px; max-width: 800px; }
.divider-q { font-family: 'Cormorant Garamond', serif; font-size: clamp(28px, 4vw, 46px); font-style: italic; color: var(--white); line-height: 1.3; }

/* 3. ТОП МЕСТА (На темном фоне фото горят) */
.places-sec { background: var(--bg); padding-top: 120px; }
.place-full { position: relative; height: 600px; overflow: hidden; margin-bottom: 8px; border-radius: 4px; }
.place-full img { width: 100%; height: 100%; object-fit: cover; transition: transform 12s ease; }
.place-full:hover img { transform: scale(1.05); }
.place-full::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, rgba(8,10,9,0.95) 0%, rgba(8,10,9,0.2) 60%, transparent 100%); }
.place-full-body { position: absolute; bottom: 0; left: 0; right: 0; padding: 46px 54px; z-index: 2; }
.place-full-tag { font-size: 10px; font-weight: 600; letter-spacing: .28em; text-transform: uppercase; color: var(--sea); margin-bottom: 12px; }
.place-full-ttl { font-family: 'Cormorant Garamond', serif; font-size: clamp(36px, 5vw, 64px); line-height: 1.05; color: var(--white); margin-bottom: 12px; }
.place-full-ttl em { font-style: italic; color: var(--acc); }
.place-full-txt { font-size: 15px; color: var(--muted); line-height: 1.7; max-width: 600px; }

.place-duo { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.place-half { position: relative; height: 480px; overflow: hidden; border-radius: 4px; }
.place-half img { width: 100%; height: 100%; object-fit: cover; transition: transform 12s ease; }
.place-half:hover img { transform: scale(1.06); }
.place-half::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, rgba(8,10,9,0.95) 0%, rgba(8,10,9,0.3) 50%, transparent 100%); }
.place-half-body { position: absolute; bottom: 0; left: 0; right: 0; padding: 36px 40px; z-index: 2; }
.place-half-tag { font-size: 9px; font-weight: 600; letter-spacing: .22em; text-transform: uppercase; color: var(--sea); margin-bottom: 10px; }
.place-half-ttl { font-family: 'Cormorant Garamond', serif; font-size: clamp(28px, 4vw, 42px); line-height: 1.1; color: var(--white); margin-bottom: 10px; }
.place-half-ttl em { font-style: italic; color: var(--acc); }
.place-half-txt { font-size: 14px; color: var(--muted); line-height: 1.6; }

/* 4. МАРШРУТ (Sticky Cards) */
.day-section { background: var(--bg2); padding-bottom: 150px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
.day-card {
  height: 60vh;
  min-height: 400px;
  position: sticky;
  top: 15vh;
  margin-bottom: 5vh;
  background: var(--bg);
  border-radius: 12px;
  overflow: hidden;
  display: flex;
  box-shadow: 0 30px 60px rgba(0,0,0,0.8);
  border: 1px solid rgba(255,255,255,0.05);
}
.day-img { width: 45%; height: 100%; overflow: hidden; position: relative; }
.day-img img { width: 100%; height: 100%; object-fit: cover; opacity: 0.85; }
.day-info {
